name: Deploy to GCP

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: asia-east1-docker.pkg.dev/blood-system-dev/tbms-image/see-app

jobs:
  deploy:
    runs-on: self-hosted
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .

      - name: Push to Artifact Registry
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy
        run: |
          cp docker-compose.prod.yml /opt/see-app/docker-compose.yml
          IMAGE_TAG=${{ github.sha }} docker compose -f /opt/see-app/docker-compose.yml up -d

      - name: Cleanup dangling images
        run: docker image prune -f
